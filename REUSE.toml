SPDX-License-Identifier = "FSL-1.1-ALv2"

# Documentation files
[[annotations]]
path = ["**/*.md", "**/*.html"]
SPDX-FileCopyrightText = "© 2025 Platform Engineering Labs Inc."
SPDX-License-Identifier = "FSL-1.1-ALv2"

# Binary and generated test files
[[annotations]]
path = ["**/*.zip", "**/*.pcf", "**/*.log", "**/*.txt"]
